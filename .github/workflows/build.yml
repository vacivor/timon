name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: Timon
  APP_ID: io.vacivor.timon
  BINARY_NAME: timon
  PROFILE: release

jobs:
  macos:
    name: macOS packages (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: timon-macos-aarch64
          - target: x86_64-apple-darwin
            archive: timon-macos-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Make CI scripts executable
        run: chmod +x ./scripts/ci/*.sh

      - name: Build macOS artifacts
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          ARCHIVE_PREFIX: ${{ matrix.archive }}
        run: ./scripts/ci/package-macos.sh

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-app
          path: dist/${{ matrix.archive }}.app.zip

      - name: Upload macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-pkg
          path: dist/${{ matrix.archive }}.pkg

  macos-universal-pkg:
    name: macOS universal pkg
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Make CI scripts executable
        run: chmod +x ./scripts/ci/*.sh

      - name: Build universal macOS pkg
        env:
          ARM_TRIPLE: aarch64-apple-darwin
          X64_TRIPLE: x86_64-apple-darwin
          ARCHIVE_PREFIX: timon-macos-universal
        run: ./scripts/ci/package-macos-universal-pkg.sh

      - name: Upload universal macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: timon-macos-universal-pkg
          path: dist/timon-macos-universal.pkg

  linux:
    name: Linux packages (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: timon-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: timon-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Make CI scripts executable
        run: chmod +x ./scripts/ci/*.sh

      - name: Install Linux build dependencies
        run: ./scripts/ci/install-linux-deps.sh

      - name: Install packaging cargo tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build Linux packages
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          ARCHIVE_PREFIX: ${{ matrix.archive }}
        run: ./scripts/ci/package-linux.sh

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-deb
          path: dist/${{ matrix.archive }}.deb

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-rpm
          path: dist/${{ matrix.archive }}.rpm

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-appimage
          path: dist/${{ matrix.archive }}.AppImage

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-flatpak
          path: dist/${{ matrix.archive }}.flatpak

  windows:
    name: Windows binary
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build archive (Windows)
        env:
          TARGET_TRIPLE: x86_64-pc-windows-msvc
          ARCHIVE_BASENAME: timon-windows-x86_64
        shell: pwsh
        run: .\scripts\ci\build-windows.ps1

      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: timon-windows-x86_64
          path: dist/timon-windows-x86_64.zip
