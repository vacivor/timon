name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: Timon
  APP_ID: io.vacivor.timon
  BUNDLE_ID: io.vacivor.timon
  BINARY_NAME: Timon
  PROFILE: release

jobs:
  macos:
    name: macOS packages (${{ matrix.target }})
    runs-on: macos-14
    env:
      SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY || vars.MACOS_SIGN_IDENTITY || '-' }}
      PKG_SIGN_IDENTITY: ${{ secrets.MACOS_PKG_SIGN_IDENTITY || vars.MACOS_PKG_SIGN_IDENTITY || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: timon-macos-aarch64
            make_app_target: package-macos-arm64-app
            make_pkg_target: package-macos-arm64-pkg
          - target: x86_64-apple-darwin
            archive: timon-macos-x86_64
            make_app_target: package-macos-x86_64-app
            make_pkg_target: package-macos-x86_64-pkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE_BASE64}" ]; then
            echo "No macOS signing certificate configured; app bundles will use ad-hoc signing."
            exit 0
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/timon-signing.keychain-db"
          CERTIFICATE_PATH="${RUNNER_TEMP}/timon-signing.p12"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-timon-signing}"

          echo "${MACOS_CERTIFICATE_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v "${KEYCHAIN_PATH}"

      - name: Build macOS app
        run: make ${{ matrix.make_app_target }}

      - name: Build macOS pkg
        run: make ${{ matrix.make_pkg_target }}

      - name: Stage macOS app artifact
        run: |
          ARTIFACT_DIR="dist/artifacts/${{ matrix.archive }}-app"
          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${ARTIFACT_DIR}"
          ditto "dist/macos/${{ matrix.target }}/Timon.app" "${ARTIFACT_DIR}/Timon.app"

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-app
          path: dist/artifacts/${{ matrix.archive }}-app

      - name: Upload macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-pkg
          path: dist/${{ matrix.archive }}.pkg

  macos-universal-pkg:
    name: macOS universal pkg
    runs-on: macos-14
    env:
      SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY || vars.MACOS_SIGN_IDENTITY || '-' }}
      PKG_SIGN_IDENTITY: ${{ secrets.MACOS_PKG_SIGN_IDENTITY || vars.MACOS_PKG_SIGN_IDENTITY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE_BASE64}" ]; then
            echo "No macOS signing certificate configured; app bundles will use ad-hoc signing."
            exit 0
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/timon-signing.keychain-db"
          CERTIFICATE_PATH="${RUNNER_TEMP}/timon-signing.p12"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-timon-signing}"

          echo "${MACOS_CERTIFICATE_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v "${KEYCHAIN_PATH}"

      - name: Build universal macOS pkg
        run: make package-macos-universal-pkg

      - name: Upload universal macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: timon-macos-universal-pkg
          path: dist/timon-macos-universal.pkg
