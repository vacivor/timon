name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: Timon
  APP_ID: io.vacivor.timon
  BINARY_NAME: Timon
  PROFILE: release

jobs:
  macos:
    name: macOS packages (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: timon-macos-aarch64
            make_app_target: package-macos-arm64-app
            make_pkg_target: package-macos-arm64-pkg
          - target: x86_64-apple-darwin
            archive: timon-macos-x86_64
            make_app_target: package-macos-x86_64-app
            make_pkg_target: package-macos-x86_64-pkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build macOS app
        run: make ${{ matrix.make_app_target }}

      - name: Build macOS pkg
        run: make ${{ matrix.make_pkg_target }}

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-app
          path: dist/macos/${{ matrix.target }}/Timon.app

      - name: Upload macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-pkg
          path: dist/${{ matrix.archive }}.pkg

  macos-universal-pkg:
    name: macOS universal pkg
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build universal macOS pkg
        run: make package-macos-universal-pkg

      - name: Upload universal macOS pkg
        uses: actions/upload-artifact@v4
        with:
          name: timon-macos-universal-pkg
          path: dist/timon-macos-universal.pkg
