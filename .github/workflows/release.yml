name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Timon
  APP_ID: io.vacivor.timon
  BUNDLE_ID: io.vacivor.timon
  BINARY_NAME: Timon
  PROFILE: release

jobs:
  macos:
    name: macOS release (${{ matrix.target }})
    runs-on: macos-14
    env:
      SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY || vars.MACOS_SIGN_IDENTITY || '-' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: timon-macos-aarch64
            make_app_target: package-macos-arm64-app
            make_dmg_target: package-macos-arm64-dmg
          - target: x86_64-apple-darwin
            archive: timon-macos-x86_64
            make_app_target: package-macos-x86_64-app
            make_dmg_target: package-macos-x86_64-dmg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE_BASE64}" ]; then
            echo "No macOS signing certificate configured; app bundles will use ad-hoc signing."
            exit 0
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/timon-signing.keychain-db"
          CERTIFICATE_PATH="${RUNNER_TEMP}/timon-signing.p12"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-timon-signing}"

          echo "${MACOS_CERTIFICATE_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v "${KEYCHAIN_PATH}"
      - run: make ${{ matrix.make_app_target }}
      - run: make ${{ matrix.make_dmg_target }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.archive }}.app.zip
            dist/${{ matrix.archive }}.dmg

  macos-universal-dmg:
    name: macOS universal dmg release
    runs-on: macos-14
    env:
      SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY || vars.MACOS_SIGN_IDENTITY || '-' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE_BASE64}" ]; then
            echo "No macOS signing certificate configured; app bundles will use ad-hoc signing."
            exit 0
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/timon-signing.keychain-db"
          CERTIFICATE_PATH="${RUNNER_TEMP}/timon-signing.p12"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-timon-signing}"

          echo "${MACOS_CERTIFICATE_BASE64}" | base64 -D > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v "${KEYCHAIN_PATH}"
      - run: make package-macos-universal-dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/timon-macos-universal.app.zip
            dist/timon-macos-universal.dmg
