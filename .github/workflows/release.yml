name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Timon
  APP_ID: io.vacivor.timon
  BINARY_NAME: Timon
  PROFILE: release

jobs:
  macos:
    name: macOS release (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: timon-macos-aarch64
            make_app_target: package-macos-arm64-app
            make_pkg_target: package-macos-arm64-pkg
          - target: x86_64-apple-darwin
            archive: timon-macos-x86_64
            make_app_target: package-macos-x86_64-app
            make_pkg_target: package-macos-x86_64-pkg
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: make ${{ matrix.make_app_target }}
      - run: make ${{ matrix.make_pkg_target }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.archive }}.app.zip
            dist/${{ matrix.archive }}.pkg

  macos-universal-pkg:
    name: macOS universal pkg release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: make package-macos-universal-pkg
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/timon-macos-universal.pkg
